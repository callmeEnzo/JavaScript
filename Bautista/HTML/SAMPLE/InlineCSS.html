<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inline CSS Example</title>
</head>
<body>

    <h1 style="color:blue; font-size: 24px; text-align: center;">
        Welcome to Inline CSS!
    </h1>

    <p style="color: green; font-size: 18px; background-color:lightgray; padding: 10px;">
        This paragraph is styled using inline CSS.
    </p>

    <button style="background-color: red; color: white; border: none; padding: 10px 20px; cursor: pointer;">
        Click Me
    </button>
</body>
</html>
